<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Parallax 3D - Brote</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f160e;
      font-family: Arial, sans-serif;
    }

    #scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      perspective: 1200px;
      background: #10180e;
    }

    .layer {
      position: absolute;
      inset: -4%;
      width: 108%;
      height: 108%;
      object-fit: cover;
      will-change: transform;
      user-select: none;
      pointer-events: none;
    }

    .background {
      filter: saturate(1.02);
    }

    .soil {
      opacity: 0.96;
    }

    .sprout {
      width: auto;
      height: auto;
      max-width: 44vw;
      max-height: 62vh;
      left: 21%;
      top: 19%;
      inset: auto;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,.18));
      transform-origin: 50% 85%;
    }

    .vignette,
    .glow {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .vignette {
      background:
        radial-gradient(circle at 50% 25%, rgba(255,255,255,0.06), transparent 32%),
        radial-gradient(circle at 50% 50%, transparent 52%, rgba(0,0,0,0.36) 100%);
      mix-blend-mode: screen;
    }

    .glow {
      background:
        radial-gradient(circle at 52% 8%, rgba(255,219,120,0.28), transparent 25%);
    }

    .content {
      position: absolute;
      right: 6vw;
      top: 10vh;
      z-index: 10;
      color: rgba(255,255,255,0.92);
      text-align: right;
      max-width: 28rem;
      text-shadow: 0 3px 12px rgba(0,0,0,.35);
    }

    .content h1 {
      margin: 0 0 .5rem 0;
      font-size: clamp(2rem, 4vw, 4.4rem);
      line-height: .95;
      letter-spacing: -.03em;
    }

    .content p {
      margin: 0;
      font-size: clamp(.95rem, 1.4vw, 1.2rem);
      line-height: 1.4;
      opacity: 0.92;
    }
  </style>
</head>
<body>
  <div id="scene">
    <img class="layer background" src="fondo.jpg" alt="">
    <img class="layer soil" src="suelo.png" alt="">
    <img class="layer sprout" src="brote.png" alt="">
    <div class="glow"></div>
    <div class="vignette"></div>

    <div class="content">
      <h1>Vida que emerge</h1>
      <p>Fondo en capas con efecto parallax 3D suave al mover el ratón.</p>
    </div>
  </div>

  <script>
    const scene = document.getElementById('scene');
    const bg = document.querySelector('.background');
    const soil = document.querySelector('.soil');
    const sprout = document.querySelector('.sprout');

    let currentX = 0, currentY = 0;
    let targetX = 0, targetY = 0;

    function animate() {
      currentX += (targetX - currentX) * 0.08;
      currentY += (targetY - currentY) * 0.08;

      bg.style.transform =
        `translate(${currentX * 14}px, ${currentY * 10}px) scale(1.06) rotateY(${currentX * 1.2}deg) rotateX(${currentY * -0.6}deg)`;

      soil.style.transform =
        `translate(${currentX * 22}px, ${currentY * 14}px) scale(1.08) rotateY(${currentX * 1.8}deg)`;

      sprout.style.transform =
        `translate(${currentX * -34}px, ${currentY * -22}px) rotateY(${currentX * -6}deg) rotateX(${currentY * 4}deg) scale(1.01)`;

      requestAnimationFrame(animate);
    }

    scene.addEventListener('mousemove', (e) => {
      const nx = e.clientX / window.innerWidth - 0.5;
      const ny = e.clientY / window.innerHeight - 0.5;
      targetX = nx * 2;
      targetY = ny * 2;
    });

    scene.addEventListener('mouseleave', () => {
      targetX = 0;
      targetY = 0;
    });

    animate();
  </script>
</body>
</html>
