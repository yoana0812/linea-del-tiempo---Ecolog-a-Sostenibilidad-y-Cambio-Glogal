<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecología, sostenibilidad y cambio global</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap');

        :root {
            --ink: #17324d;
            --ink-soft: #4e647b;
            --line: #2cc7b7;
            --blue: #1991ff;
            --green: #1fbe74;
            --lime: #c9f25f;
            --sun: #ffbf47;
            --coral: #ff6b57;
            --shadow: 0 20px 50px rgba(22, 55, 88, 0.16);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Nunito', sans-serif;
            color: var(--ink);
            overflow-x: hidden;
            position: relative;
            background:
                radial-gradient(circle at 15% 15%, rgba(255, 191, 71, 0.45), transparent 18%),
                radial-gradient(circle at 85% 20%, rgba(25, 145, 255, 0.20), transparent 24%),
                radial-gradient(circle at 70% 85%, rgba(31, 190, 116, 0.18), transparent 20%),
                linear-gradient(180deg, #aee4ff 0%, #dff5ff 22%, #fff9ec 58%, #f7f1df 100%);
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            pointer-events: none;
            z-index: -1;
        }

        body::before {
            inset: -8vh -8vw auto;
            height: 56vh;
            background:
                radial-gradient(circle at 12% 29%, rgba(255, 255, 255, 0.76) 0 54px, transparent 55px),
                radial-gradient(circle at 18% 23%, rgba(255, 255, 255, 0.9) 0 82px, transparent 83px),
                radial-gradient(circle at 25% 28%, rgba(255, 255, 255, 0.8) 0 64px, transparent 65px),
                radial-gradient(circle at 73% 23%, rgba(255, 255, 255, 0.72) 0 52px, transparent 53px),
                radial-gradient(circle at 79% 18%, rgba(255, 255, 255, 0.88) 0 78px, transparent 79px),
                radial-gradient(circle at 86% 24%, rgba(255, 255, 255, 0.78) 0 60px, transparent 61px),
                radial-gradient(circle at 58% 62%, rgba(201, 242, 95, 0.28) 0 8%, transparent 9%);
            opacity: 0.94;
            transform: translateY(calc(var(--scroll-offset, 0vh) * 0.35));
            will-change: transform;
            filter: blur(1.6px);
        }

        body::after {
            left: 0;
            right: 0;
            bottom: -4vh;
            height: 38vh;
            background:
                radial-gradient(circle at 4% 76%, rgba(255, 233, 173, 0.95) 0 5.5px, transparent 6.5px),
                radial-gradient(circle at 4% 76%, rgba(255, 191, 71, 0.96) 0 1.9px, transparent 2.8px),

                radial-gradient(circle at 13% 75%, rgba(25, 145, 255, 0.78) 0 2px, transparent 2.8px),

                radial-gradient(circle at 49% 64%, rgba(240, 226, 255, 0.92) 0 8.4px, transparent 9.4px),
                radial-gradient(circle at 49% 64%, rgba(157, 123, 255, 0.82) 0 2.9px, transparent 3.8px),

                radial-gradient(circle at 60% 61%, rgba(232, 245, 255, 0.92) 0 9px, transparent 10px),
                radial-gradient(circle at 60% 61%, rgba(25, 145, 255, 0.78) 0 3px, transparent 4px),
                radial-gradient(circle at 63% 74%, rgba(255, 220, 232, 0.9) 0 5.7px, transparent 6.7px),
                radial-gradient(circle at 63% 74%, rgba(255, 107, 87, 0.84) 0 2px, transparent 2.8px),
                radial-gradient(circle at 67% 67%, rgba(232, 255, 197, 0.92) 0 8px, transparent 9px),

                radial-gradient(circle at 76% 63%, rgba(255, 107, 87, 0.88) 0 2.9px, transparent 3.8px),
                radial-gradient(circle at 80% 75%, rgba(232, 245, 255, 0.9) 0 5.2px, transparent 6.2px),
                radial-gradient(circle at 80% 75%, rgba(25, 145, 255, 0.74) 0 1.9px, transparent 2.7px),
                radial-gradient(circle at 83% 66%, rgba(255, 236, 191, 0.93) 0 7.8px, transparent 8.8px),
                radial-gradient(circle at 83% 66%, rgba(255, 158, 88, 0.88) 0 2.7px, transparent 3.6px),
                radial-gradient(circle at 87% 72%, rgba(232, 255, 197, 0.9) 0 6px, transparent 7px),
                radial-gradient(circle at 87% 72%, rgba(201, 242, 95, 0.92) 0 2.2px, transparent 3px),
                radial-gradient(circle at 90% 64%, rgba(240, 226, 255, 0.9) 0 8px, transparent 9px),
                radial-gradient(circle at 90% 64%, rgba(157, 123, 255, 0.8) 0 2.7px, transparent 3.6px),
                radial-gradient(circle at 93% 76%, rgba(255, 222, 235, 0.88) 0 5px, transparent 6px),
                radial-gradient(circle at 93% 76%, rgba(255, 107, 87, 0.84) 0 1.8px, transparent 2.6px),
                radial-gradient(circle at 96% 68%, rgba(232, 245, 255, 0.9) 0 6.6px, transparent 7.6px),
                radial-gradient(circle at 96% 68%, rgba(25, 145, 255, 0.72) 0 2.2px, transparent 3px),
                radial-gradient(125% 24% at 20% 84%, rgba(151, 206, 96, 0.22) 0 18%, transparent 19%),
                radial-gradient(125% 20% at 34% 86%, rgba(203, 229, 142, 0.14) 0 15%, transparent 16%),
                radial-gradient(125% 18% at 56% 84%, rgba(183, 219, 128, 0.16) 0 15%, transparent 16%),
                radial-gradient(125% 20% at 74% 82%, rgba(179, 222, 109, 0.18) 0 16%, transparent 17%),
                radial-gradient(140% 100% at 20% 100%, rgba(48, 132, 74, 0.95) 0 40%, transparent 41%),
                radial-gradient(100% 90% at 52% 100%, rgba(29, 103, 77, 0.92) 0 36%, transparent 37%),
                radial-gradient(120% 90% at 84% 100%, rgba(19, 77, 70, 0.92) 0 40%, transparent 41%);
            opacity: 0.95;
        }

        .pollinator-layer {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        @media (prefers-reduced-motion: reduce) {
            .pollinator-layer {
                display: none;
            }
        }

        header {
            position: relative;
            display: grid;
            grid-template-columns: minmax(0, 1.35fr) minmax(260px, 0.75fr);
            align-items: center;
            gap: 1.6rem;
            max-width: 1240px;
            margin: 0 auto;
            padding: clamp(1.9rem, 3vw, 2.8rem) 2rem 4.6rem;
            z-index: 1;
        }

        header::before {
            content: '';
            position: absolute;
            inset: 0.45rem 0.9rem 1rem;
            border-radius: 36px;
            background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.2)),
                radial-gradient(circle at top right, rgba(255, 255, 255, 0.75), transparent 28%);
            border: 1px solid rgba(255, 255, 255, 0.45);
            box-shadow: 0 30px 60px rgba(33, 74, 112, 0.12);
            backdrop-filter: blur(8px);
            z-index: -1;
        }

        .hero-shell {
            position: relative;
            z-index: 1;
        }

        .hero-kicker {
            display: inline-flex;
            align-items: center;
            gap: 0.65rem;
            padding: 0.7rem 1rem;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.82);
            color: #0a6d80;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 0.82rem;
            box-shadow: 0 12px 30px rgba(9, 89, 118, 0.14);
        }

        .hero-kicker::before {
            content: '';
            width: 0.7rem;
            height: 0.7rem;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--sun), var(--coral));
            box-shadow: 0 0 0 6px rgba(255, 191, 71, 0.18);
        }

        header h1 {
            margin-top: 0.7rem;
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(3rem, 5.8vw, 5.5rem);
            line-height: 0.94;
            letter-spacing: -0.05em;
            color: #12304f;
            max-width: 11ch;
            text-wrap: balance;
        }

        .hero-highlight {
            color: #0e8f88;
            text-shadow: 0 8px 24px rgba(14, 143, 136, 0.16);
        }

        .hero-orbit {
            position: relative;
            width: min(100%, 248px);
            aspect-ratio: 1;
            margin-left: auto;
            border-radius: 50%;
            background:
                radial-gradient(circle at 32% 30%, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.18) 26%, transparent 27%),
                linear-gradient(145deg, #1c9cff 0%, #28c6b8 56%, #bdf564 100%);
            box-shadow:
                inset 0 0 0 14px rgba(255, 255, 255, 0.35),
                0 28px 55px rgba(18, 76, 108, 0.22);
            overflow: visible;
        }

        .hero-orbit::before,
        .hero-orbit::after {
            content: '';
            position: absolute;
            inset: 8%;
            border-radius: 50%;
            border: 2px dashed rgba(255, 255, 255, 0.38);
        }

        .hero-orbit::after {
            inset: 20%;
            border-style: solid;
            border-color: rgba(255, 255, 255, 0.28);
        }

        .hero-orbit-core {
            position: absolute;
            inset: 23%;
            display: grid;
            place-items: center;
            text-align: center;
            padding: 0.45rem;
            border-radius: 50%;
            background: rgba(255, 252, 244, 0.94);
            color: #194260;
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(0.95rem, 1.8vw, 1.32rem);
            font-weight: 700;
            line-height: 1.1;
            box-shadow: inset 0 0 0 10px rgba(255, 255, 255, 0.55);
            z-index: 1;
        }

        .hero-badge {
            position: absolute;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 88px;
            padding: 0.85rem 1rem;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.92);
            color: #143a54;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 800;
            letter-spacing: 0.01em;
            box-shadow: 0 12px 30px rgba(23, 62, 91, 0.18);
            z-index: 2;
        }

        .hero-badge-top {
            top: 5%;
            right: 4%;
            transform: rotate(10deg);
        }

        .hero-badge-right {
            right: -5%;
            bottom: 24%;
            background: rgba(255, 245, 217, 0.95);
            transform: rotate(-7deg);
        }

        .hero-badge-bottom {
            left: -6%;
            bottom: 13%;
            background: rgba(255, 255, 255, 0.93);
            transform: rotate(-10deg);
        }

        .timeline-container {
            max-width: 1320px;
            margin: 2.2rem auto 5rem;
            position: relative;
            padding: 0 2rem 2rem;
            z-index: 1;
        }

        .timeline-container::after {
            content: none;
        }

        .timeline-container::before {
            content: none;
        }

        .timeline-thread {
            position: absolute;
            top: -4.1rem;
            height: calc(100% + 10.4rem);
            left: 50%;
            width: 86px;
            transform: translateX(-50%);
            z-index: 0;
            pointer-events: none;
            overflow: visible;
            filter: drop-shadow(0 14px 28px rgba(20, 55, 84, 0.16));
        }

        .timeline-thread .thread-shadow {
            fill: none;
            stroke: rgba(22, 84, 144, 0.18);
            stroke-width: 22;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .timeline-thread .thread-core {
            fill: none;
            stroke: url(#threadGradient);
            stroke-width: 14;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .timeline-thread .thread-highlight {
            fill: none;
            stroke: rgba(255, 255, 255, 0.52);
            stroke-width: 4.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .timeline-thread .thread-pulse {
            fill: rgba(255, 255, 255, 0.28);
        }

        .timeline-item {
            padding: 22px 108px;
            position: relative;
            width: 50%;
            opacity: 0;
            transform: translateY(60px);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1), z-index 0s;
            z-index: 10;
        }

        .timeline-item:not(.special-item) {
            padding-left: 24px;
            padding-right: 24px;
        }

        .timeline-item.special-item:not(.diagonal-item) {
            padding-left: 24px;
            padding-right: 24px;
        }

        .timeline-item:hover {
            z-index: 999 !important;
        }

        .timeline-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .timeline-item.align-left {
            left: 0;
        }

        .timeline-item.align-right {
            left: 50%;
        }

        .timeline-year {
            position: absolute;
            top: 50%;
            border-radius: 999px;
            padding: 0.9rem 1.3rem;
            font-size: 1.15rem;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 800;
            line-height: 1;
            letter-spacing: 0.02em;
            z-index: 2;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            white-space: nowrap;
            color: #103048;
            background: rgba(255, 252, 244, 0.96);
            border: 4px solid transparent;
            box-shadow: 0 12px 28px rgba(18, 59, 88, 0.15);
        }

        .timeline-item.align-left .timeline-year {
            right: 0;
            transform: translate(50%, -50%) rotate(-4deg);
        }

        .timeline-item.align-right .timeline-year {
            left: 0;
            transform: translate(-50%, -50%) rotate(4deg);
        }

        .timeline-item.align-left:hover .timeline-year {
            transform: translate(50%, -50%) rotate(-2deg) scale(1.08);
        }

        .timeline-item.align-right:hover .timeline-year {
            transform: translate(-50%, -50%) rotate(2deg) scale(1.08);
        }

        .timeline-item:not(.special-item) .timeline-year {
            font-size: 1.45rem;
            padding: 1rem 1.45rem;
            border-color: rgba(25, 145, 255, 0.9);
            box-shadow: 0 16px 34px rgba(25, 145, 255, 0.24);
            color: #0a74d0;
        }

        .timeline-content {
            padding: 1.65rem 1.75rem 1.8rem;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.985), rgba(255, 250, 240, 0.95)),
                radial-gradient(circle at 84% 16%, rgba(255, 191, 71, 0.1), transparent 26%);
            position: relative;
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.65);
            border-top: 8px solid var(--blue);
            box-shadow: var(--shadow);
            backdrop-filter: blur(8px);
            transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.35s ease;
            cursor: default;
            display: block;
            width: 75%;
            max-width: none;
            box-sizing: border-box;
            overflow: visible;
            isolation: isolate;
        }

        .timeline-item.align-left .timeline-content {
            margin-left: auto;
            margin-right: 4.5rem;
        }

        .timeline-item.align-right .timeline-content {
            margin-right: auto;
            margin-left: 4.5rem;
        }

        .timeline-image {
            border-radius: 18px;
            object-fit: cover;
            box-shadow: 0 10px 24px rgba(17, 51, 77, 0.12);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .box-image {
            width: 100%;
            max-width: none;
            height: auto;
            aspect-ratio: 1 / 1;
            border: 4px solid rgba(255, 255, 255, 0.82);
            background: rgba(255, 255, 255, 0.8);
        }

        .special-image {
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1;
            border-radius: 28px;
            background: #ffffff;
            padding: 6px;
            border: 3px solid rgba(255, 255, 255, 0.7);
        }

        .content-body {
            display: block;
            min-width: 0;
            overflow: visible;
            max-height: none;
            padding-right: 0;
        }

        .content-body::after {
            content: '';
            display: block;
            clear: both;
        }

        .content-media {
            float: right;
            width: clamp(146px, 34%, 210px);
            margin: 0.1rem 0 0.95rem 1.25rem;
            position: relative;
            z-index: 1;
        }

        .content-media .image-link-wrapper,
        .content-media .timeline-image {
            display: block;
            width: 100%;
        }

        .content-body::-webkit-scrollbar {
            width: 0;
        }

        .content-body::-webkit-scrollbar-track {
            background: rgba(20, 58, 84, 0.05);
            border-radius: 999px;
        }

        .content-body::-webkit-scrollbar-thumb {
            background: rgba(25, 145, 255, 0.35);
            border-radius: 999px;
        }

        .timeline-content:hover {
            transform: translateY(-4px);
            box-shadow: 0 24px 48px rgba(17, 58, 87, 0.2);
            z-index: 999 !important;
        }

        .timeline-content::after,
        .special-label::after {
            content: '';
            position: absolute;
            top: 12px;
            right: 12px;
            width: 78px;
            height: 78px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0));
            opacity: 0.42;
            pointer-events: none;
        }

        .timeline-item.special-item.align-left:not(.diagonal-item) .timeline-year {
            border-color: rgba(31, 190, 116, 0.9);
            box-shadow: 0 16px 34px rgba(31, 190, 116, 0.24);
            color: #14975c;
        }

        .timeline-item.special-item.align-left:not(.diagonal-item) .special-text h3 {
            color: #169a62;
        }

        .timeline-item.special-item.align-left:not(.diagonal-item) .special-image {
            border-color: rgba(31, 190, 116, 0.45);
            box-shadow: 0 14px 28px rgba(31, 190, 116, 0.18);
        }

        .timeline-item.special-item.align-right:not(.diagonal-item) .timeline-year {
            border-color: rgba(255, 107, 87, 0.9);
            box-shadow: 0 16px 34px rgba(255, 107, 87, 0.24);
            color: #dd503d;
        }

        .timeline-item.special-item.align-right:not(.diagonal-item) .special-text h3 {
            color: #df5b35;
        }

        .timeline-item.special-item.align-right:not(.diagonal-item) .special-image {
            border-color: rgba(255, 107, 87, 0.45);
            box-shadow: 0 14px 28px rgba(255, 107, 87, 0.18);
        }

        .timeline-item.diagonal-item .special-label {
            position: relative;
            width: auto;
            max-width: min(100%, 420px);
            min-height: 0;
            padding: 0;
            background: none;
            border: none;
            border-radius: 0;
            box-shadow: none;
            backdrop-filter: none;
            transform: none;
        }

        .timeline-item.diagonal-item .special-label::before,
        .timeline-item.diagonal-item .special-label::after {
            content: none;
        }

        .timeline-item.diagonal-item .special-text {
            padding: 0;
            background: none;
            border: none;
            border-radius: 0;
            box-shadow: none;
            display: block;
        }

        .timeline-item.diagonal-item .special-text::before {
            content: none;
        }

        .timeline-item.diagonal-item .special-text h3 {
            color: #d54934 !important;
            margin: 0;
            font-size: clamp(2rem, 1.75rem + 0.55vw, 2.5rem);
            line-height: 0.96;
            text-shadow: none;
            max-width: none;
        }

        .special-detail-image {
            display: block;

        .special-label {
            position: relative;

        .timeline-item.special-item:not(.diagonal-item) .special-label::before {
            content: '';

        .special-label:hover {

        .special-text {

        .special-text::after {
            content: '';

            clear: both;
        }

        .special-media {

        .special-text h3 {

        .special-label.has-image .special-text h3 {

        .special-desc {
            margin: 0;

        }

        .image-link-wrapper {
            display: block;
            flex-shrink: 0;
            border-radius: 24px;
        }

        .image-link-wrapper img {
            display: block;
        }

        .wiki-link {
            color: #0872cb;
            text-decoration: none;
            border-bottom: 2px dashed rgba(8, 114, 203, 0.4);
            transition: all 0.2s ease;
            font-weight: 800;
        }

        .wiki-link:hover {
            color: #0b5ca0;
            border-bottom-style: solid;
            background: linear-gradient(180deg, rgba(25, 145, 255, 0.03), rgba(25, 145, 255, 0.12));
            border-radius: 4px;
        }

        .timeline-item.align-left.special-item .special-text {
            text-align: left;
        }

        .timeline-item.align-right.special-item .special-text {
            text-align: left;
        }

        .timeline-item.align-left.special-item .special-label {
            margin-left: auto;
            margin-right: 4rem;
            padding-right: 18px;
        }

        .timeline-item.align-right.special-item .special-label {
            margin-right: auto;
            margin-left: 4rem;
        }

        .timeline-item.diagonal-item.align-left .special-label {
            margin-right: -1.1rem;
        }

        .timeline-item.diagonal-item.align-right .special-label {
            margin-left: -2.35rem;
        }

        .timeline-item.diagonal-item.align-right .special-timeline-detail {
            left: -4.75rem;

        }

        @keyframes bounce-right {
            from {
                transform: translate(0, 0);
            }

            to {
                transform: translate(12px, 0);
            }
        }

        @keyframes bounce-left {

                transform: translate(0, 0) scaleX(-1);

            }

        .timeline-content h2 {

        .special-desc {

        .timeline-content::before {

        .timeline-item.align-left .timeline-content::before {

        .lightbox {

        .lightbox-caption:empty {

        @keyframes zoomIn {

        @media screen and (max-width: 1024px) {

            .timeline-item.align-right {
                left: 0%;
            }

            .timeline-item.align-left .timeline-year,
            .timeline-item.align-right .timeline-year {

                transform: translate(-50%, -50%) rotate(-3deg);
            }

            .timeline-item.align-left:hover .timeline-year,
            .timeline-item.align-right:hover .timeline-year {
                transform: translate(-50%, -50%) rotate(-1deg) scale(1.08);
            }

            .timeline-item.align-left,
            .timeline-item.align-right {
                left: 0;
            }

            .timeline-content {
                width: 100%;
                max-width: none;
            }

            .special-label {
                width: 100%;
                max-width: none;
            }

            .timeline-item.diagonal-item .special-label {
                width: auto;
                max-width: 100%;
            }

            .timeline-item.diagonal-item .special-label {
                margin-right: 0;
            }

            .timeline-item.align-left .timeline-content,
            .timeline-item.align-right .timeline-content,
            .timeline-item.align-left.special-item .special-label,
            .timeline-item.align-right.special-item .special-label {
                margin-left: 0;
                margin-right: 0;
            }

            .timeline-item.align-left .timeline-content::before,
            .timeline-item.align-right .timeline-content::before,
            .timeline-item.align-left.special-item:not(.diagonal-item) .special-label::before,
            .timeline-item.align-right.special-item:not(.diagonal-item) .special-label::before {
                left: -24px;

        @media screen and (max-width: 640px) {

    </style>
</head>

<body>
    <canvas class="pollinator-layer" aria-hidden="true"></canvas>

    <header>
        <div class="hero-shell">
            <p class="hero-kicker">Línea del tiempo interactiva</p>
            <h1>Ecología, <span class="hero-highlight">sostenibilidad</span> y cambio global</h1>
        </div>
        <div class="hero-orbit" aria-hidden="true">
            <div class="hero-orbit-core">Tu planeta<br>tu historia</div>
            <span class="hero-badge hero-badge-top">Conoce</span>
            <span class="hero-badge hero-badge-right">Valora</span>
            <span class="hero-badge hero-badge-bottom">Actúa</span>
        </div>
    </header>

    <div class="timeline-container">
        <svg class="timeline-thread" viewBox="0 0 86 1180" preserveAspectRatio="none" aria-hidden="true">
            <defs>
                <linearGradient id="threadGradient" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#1991ff" />
                    <stop offset="48%" stop-color="#2cc7b7" />
                    <stop offset="100%" stop-color="#c9f25f" />
                </linearGradient>
            </defs>
            <circle class="thread-pulse a" cx="24" cy="258" r="11" />
            <circle class="thread-pulse b" cx="59" cy="536" r="8" />
            <circle class="thread-pulse c" cx="23" cy="772" r="9.5" />
            <path class="thread-shadow" d="M42 36 C70 144 12 248 46 344 C76 430 10 540 44 648 C76 754 18 872 42 1124" />
            <path class="thread-core" d="M42 36 C70 144 12 248 46 344 C76 430 10 540 44 648 C76 754 18 872 42 1124" />
            <path class="thread-highlight" d="M42 36 C62 144 22 248 44 344 C66 430 22 540 42 648 C66 754 24 872 42 1124" />
        </svg>
        <!-- Elements rendering -->
    </div>

    <script>
        const timelineData = [
            { year: "1866", title: "Ecología", desc: "<a href='https://es.wikipedia.org/wiki/Ernst_Haeckel' target='_blank' class='wiki-link'>Ernst Haeckel</a> utiliza por primera vez la palabra <a href='https://dle.rae.es/ecolog%C3%ADa' target='_blank' class='wiki-link'>ecología</a> en su trabajo <i>Generelle Morphologie der Organismen</i>. Su significado estaba relacionado con el \"<a href='https://www.tremedica.org/wp-content/uploads/n34-entremeses-gabaudan.pdf' target='_blank' class='wiki-link'>estudio de la economía de las interrelaciones de los organismos</a>\" y no tanto con el estudio del \"medio ambiente\".", align: "left", image: "https://commons.wikimedia.org/wiki/Special:FilePath/Ernst_Haeckel.jpg?width=300" },
            { year: "1896", title: "Cambio climático por CO2", desc: "<a href='https://es.wikipedia.org/wiki/Svante_Arrhenius' target='_blank' class='wiki-link'>Svante Arrhenius</a> comienza a hacer estimaciones sobre el calentamiento de la tierra a causa del <a href='https://www.youtube.com/watch?v=8Y2LIQJlb7E' target='_blank' class='wiki-link'>aumento del CO2</a>.", align: "left", image: "./img/efecto invernadero.png" },
            { year: "1918", title: "Parque Nacional de la Montaña de Covadonga", desc: "Primer parque nacional en el estado español.", align: "right", special: true, image: "./img/covadonga.webp" },
            { year: "1935", title: "Ecosistema", desc: "<a href='https://es.wikipedia.org/wiki/Arthur_Tansley' target='_blank' class='wiki-link'>Arthur Tansley</a> formula el concepto de '<a href='https://descargas.intef.es/recursos_educativos/RED_ES/03_Eso/1/S_1_017_2025_0504/S_1_017_2025_0504_VD_05061.mp4' target='_blank' class='wiki-link'>ecosistema</a>'. Ya no se mira solamente a los seres vivos, sino también su relación con el medio físico.", align: "left", image: "./img/hayedo urbasa.jpg" },
            { year: "1962", title: "Libro Primavera silenciosa", desc: "Libro decisivo para alertar sobre los pesticidas y para impulsar el ecologismo moderno.", align: "right", special: true, image: "./img/Carson Rachel.jpg" },
            { year: "1972", title: "Primera conferencia mundial sobre medio ambiente", desc: "La <a href='https://www.un.org/es/conferences/environment/stockholm1972' target='_blank' class='wiki-link'>Conferencia de las Naciones Unidas, celebrada en Estocolmo</a>, Suecia. Los participantes adoptaron una serie de principios para la gestión racional del medio ambiente.", align: "left", image: "https://commons.wikimedia.org/wiki/Special:FilePath/UN_emblem_blue.svg?width=300" },
            { year: "1976", title: "Gran movimiento contra la energía nuclear en Euskadi", desc: "Este gran movimiento social además de ayudar en el freno de centrales nucleares como Lemoniz y Garoña, ayudó a cambiar la cultura política vasca y española sobre la energía (la población también debe opinar).", align: "right", special: true, image: "https://commons.wikimedia.org/wiki/Special:FilePath/Smiling_Sun_English_Language.svg?width=300" },
            { year: "1979", title: "Día del Medio Ambiente", desc: "Impulsado por varias organizaciones a nivel mundial, se declara oficialmente el <a href='https://ekoetxea.eus/es/dia-medio-ambiente/' target='_blank' class='wiki-link'>Día del Medio Ambiente</a>.", align: "left", image: "./img/dia-mundial-de-la-tierra.jpeg" },
            { year: "1987", title: "Desarrollo sostenible", desc: "Se utiliza el término oficialmente por primera vez en el <a href='https://es.wikipedia.org/wiki/Informe_Brundtland' target='_blank' class='wiki-link'>Informe Brundtland</a>. Se define como la satisfacción de las necesidades de la generación presente sin comprometer las necesidades de las generaciones futuras.", align: "left", image: "./img/desarrollo_soste.png" },
            { year: "1990", title: "Cambio global", desc: "Se consolida la idea de <a href='https://www.miteco.gob.es/es/parques-nacionales-oapn/red-parques-nacionales/seguimiento/seguimiento-ecologico/red-seguimiento/que-es.html' target='_blank' class='wiki-link'>cambio global</a> como conjunto de cambios ambientales afectados por la actividad humana, con especial referencia a cambios en los procesos que determinan el funcionamiento de los sistemas naturales.", align: "left", image: "https://commons.wikimedia.org/wiki/Special:FilePath/The_Earth_seen_from_Apollo_17.jpg?width=300" },
            { year: "1992", title: "Cumbre de Río de Janeiro", desc: "Tras 20 años de la Conferencia de Estocolmo, la <a href='https://www.un.org/es/conferences/environment/rio1992' target='_blank' class='wiki-link'>Cumbre de Río de Janeiro</a> reunió a 179 países, que declararon procurar alcanzar acuerdos internacionales en los que se respeten los intereses de todos y se proteja la integridad del sistema ambiental y de desarrollo mundial.", align: "left" },
            { year: "2002", title: "\"Nunca Máis\"", desc: "Tras el desastre del Prestige en Galicia surge una movilización ciudadana enorme, con protestas masivas y una fuerte respuesta social ante una catástrofe ecológica.", align: "right", special: true, image: "./img/nunca mais.jpg" },
            { year: "2012", title: "Tu naciste aquí", desc: "", special: true, align: "right", hideYear: true, diagonal: true, detailImage: "./img/cake2.png" },
            { year: "2015", title: "Acuerdo de París", desc: "En el <a href='https://www.youtube.com/watch?v=yE2uZHfwo8Y' target='_blank' class='wiki-link'>Acuerdo de París</a>, líderes mundiales acuerdan objetivos a largo plazo como guía para todas las naciones. Entre ellos, reducir sustancialmente las emisiones de gases de efecto invernadero para limitar el aumento de la temperatura global en este siglo a 2 °C.", align: "left", image: "https://commons.wikimedia.org/wiki/Special:FilePath/Sustainable_Development_Goals.svg?width=300", imageLink: "https://www.un.org/sustainabledevelopment/es/sustainable-development-goals/" }
        ];

        const imageCaptions = {
            "1866": "Retrato de Ernst Haeckel",
            "1896": "Esquema del efecto invernadero",
            "1918": "Paisaje de Covadonga",
            "1935": "Hayedo de Urbasa",
            "1962": "Retrato de Rachel Carson, autora de Primavera silenciosa",
            "1972": "Emblema de Naciones Unidas",
            "1976": "Icono del movimiento antinuclear",
            "1979": "Manifestación del Día del Medio Ambiente",
            "1987": "Icono de desarrollo sostenible",
            "1990": "La Tierra vista desde el espacio",
            "2002": "Trabajos de limpieza y recuperación tras el desastre del Prestige.",
            "2015": "Iconos de los ODS"
        };

        const imageLightboxStyles = {
            "1972": "panel",
            "1976": "panel",
            "2015": "panel-large"
        };

        const escapeAttribute = (value = '') => String(value)
            .replace(/&/g, '&amp;')
            .replace(/"/g, '&quot;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');

        const container = document.querySelector('.timeline-container');

        timelineData.forEach(item => {
            const el = document.createElement('div');
            el.className = 'timeline-item align-' + item.align + (item.special ? ' special-item' : '') + (item.diagonal ? ' diagonal-item' : '');

            const isSpecial = item.special;
            const imageCaption = item.image ? (imageCaptions[item.year] || item.title) : '';
            const safeImageCaption = escapeAttribute(imageCaption);
            const imageLightboxStyle = item.image ? (imageLightboxStyles[item.year] || '') : '';
            const safeLightboxStyle = escapeAttribute(imageLightboxStyle);

            el.innerHTML = isSpecial
                ? `
                ${!item.hideYear ? `<div class="timeline-year">${item.year}</div>` : ''}
                <div class="special-label${item.image ? ' has-image' : ''}">
                    <div class="special-text">
                        ${item.image ? `<div class="special-media">${item.imageLink ? `<a href="${item.imageLink}" target="_blank" class="image-link-wrapper"><img src="${item.image}" alt="${safeImageCaption || 'Imagen interactiva'}" data-caption="${safeImageCaption}" data-lightbox-style="${safeLightboxStyle}" class="timeline-image special-image" /></a>` : `<img src="${item.image}" alt="${safeImageCaption || 'Imagen descriptiva'}" data-caption="${safeImageCaption}" data-lightbox-style="${safeLightboxStyle}" class="timeline-image special-image" />`}</div>` : ''}
                        <h3>${item.title}</h3>
                        ${item.desc ? `<p class="special-desc">${item.desc}</p>` : ''}
                    </div>
                </div>
                ${item.detailImage ? `<div class="special-timeline-detail"><img src="${item.detailImage}" alt="" class="special-detail-image clean-background" aria-hidden="true" /></div>` : ''}
                `
                : `
                <div class="timeline-year">${item.year}</div>
                <div class="timeline-content${item.image ? ' has-image' : ''}">
                    <div class="content-body">
                        ${item.image ? `<div class="content-media">${item.imageLink ? `<a href="${item.imageLink}" target="_blank" class="image-link-wrapper"><img src="${item.image}" alt="${safeImageCaption || 'Imagen interactiva'}" data-caption="${safeImageCaption}" data-lightbox-style="${safeLightboxStyle}" class="timeline-image box-image" /></a>` : `<img src="${item.image}" alt="${safeImageCaption || 'Imagen descriptiva'}" data-caption="${safeImageCaption}" data-lightbox-style="${safeLightboxStyle}" class="timeline-image box-image" />`}</div>` : ''}
                        <h2>${item.title}</h2>
                        ${item.desc ? `<p>${item.desc}</p>` : ''}
                    </div>
                </div>
                `;
            container.appendChild(el);
        });

        const cleanConnectedLightBackground = (img) => {
            if (!img || img.dataset.cleanedBackground === 'true') return;
            if (!img.complete || !img.naturalWidth) return;

            const canvas = document.createElement('canvas');
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            ctx.drawImage(img, 0, 0);

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const { data, width, height } = imageData;
            const visited = new Uint8Array(width * height);
            const stack = [];

            const isBackgroundPixel = (x, y) => {
                const pixelIndex = (y * width + x) * 4;
                const alpha = data[pixelIndex + 3];
                if (alpha < 10) return false;

                const r = data[pixelIndex];
                const g = data[pixelIndex + 1];
                const b = data[pixelIndex + 2];
                const max = Math.max(r, g, b);
                const min = Math.min(r, g, b);

                return max > 180 && min > 158 && max - min < 34;
            };

            const pushPixel = (x, y) => {
                if (x < 0 || y < 0 || x >= width || y >= height) return;
                const flatIndex = y * width + x;
                if (visited[flatIndex]) return;
                if (!isBackgroundPixel(x, y)) return;
                visited[flatIndex] = 1;
                stack.push([x, y]);
            };

            for (let x = 0; x < width; x += 1) {
                pushPixel(x, 0);
                pushPixel(x, height - 1);
            }

            for (let y = 0; y < height; y += 1) {
                pushPixel(0, y);
                pushPixel(width - 1, y);
            }

            while (stack.length) {
                const [x, y] = stack.pop();
                const pixelIndex = (y * width + x) * 4;
                data[pixelIndex + 3] = 0;

                pushPixel(x + 1, y);
                pushPixel(x - 1, y);
                pushPixel(x, y + 1);
                pushPixel(x, y - 1);
            }

            ctx.putImageData(imageData, 0, 0);
            img.dataset.cleanedBackground = 'true';
            img.src = canvas.toDataURL('image/png');
        };

        document.querySelectorAll('.clean-background').forEach((img) => {
            if (img.complete) {
                cleanConnectedLightBackground(img);
            } else {
                img.addEventListener('load', () => cleanConnectedLightBackground(img), { once: true });
            }
        });

        // Intersection Observer for scroll animations
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, {
            threshold: 0.1,
            rootMargin: "0px 0px -50px 0px"
        });

        document.querySelectorAll('.timeline-item').forEach(item => {
            observer.observe(item);
        });

        // --- Parallax Background Effect ---
        window.addEventListener('scroll', () => {
            const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
            if (maxScroll <= 0) return;
            const fraction = Math.max(0, Math.min(1, window.scrollY / maxScroll));
            // Move proportionally across the 30vh overflowing surplus from +15vh to -15vh
            const offsetVh = 15 - (fraction * 30);
            document.body.style.setProperty('--scroll-offset', offsetVh + 'vh');
        });
        window.dispatchEvent(new Event('scroll')); // trigger once on load to correctly align background

        // --- Lightbox Interaction logic ---
        const lightbox = document.createElement('div');
        lightbox.className = 'lightbox';
        lightbox.innerHTML = `
            <span class="close-lightbox">&times;</span>
            <div class="lightbox-figure">
                <img class="lightbox-img" src="" alt="Vista ampliada" />
                <p class="lightbox-caption"></p>
            </div>
        `;
        document.body.appendChild(lightbox);

        const lbFigure = lightbox.querySelector('.lightbox-figure');
        const lbImg = lightbox.querySelector('.lightbox-img');
        const lbCaption = lightbox.querySelector('.lightbox-caption');

        container.addEventListener('click', (e) => {
            if (e.target.classList.contains('timeline-image')) {
                // Remove ?width restriction to load higher resolution automatically
                let src = e.target.src.replace('?width=300', '').replace('?width=400', '');
                lbImg.src = src;
                lbCaption.textContent = e.target.dataset.caption || e.target.alt || '';
                lbFigure.classList.toggle('is-panel', e.target.dataset.lightboxStyle === 'panel');
                lbFigure.classList.toggle('is-panel-large', e.target.dataset.lightboxStyle === 'panel-large');
                document.body.style.overflow = "hidden"; // Prevent background scroll
                lightbox.classList.add('active');
            }
        });

        lightbox.addEventListener('click', (e) => {
            // Close when clicking outside image or on 'X'
            if (e.target !== lbImg) {
                lightbox.classList.remove('active');
                document.body.style.overflow = ""; // Restore background scroll
                setTimeout(() => {
                    lbImg.src = '';
                    lbCaption.textContent = '';
                    lbFigure.classList.remove('is-panel');
                    lbFigure.classList.remove('is-panel-large');
                }, 300); // clear source after transition
            }
        });

        // --- Pollinator background animation ---
        const pollinatorCanvas = document.querySelector('.pollinator-layer');
        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');

        if (pollinatorCanvas && !prefersReducedMotion.matches) {
            const pollinatorCtx = pollinatorCanvas.getContext('2d');
            const rawBeeImages = [new Image(), new Image()];
            const beeSprites = [];
            const beeState = {
                x: window.innerWidth * 0.72,
                y: window.innerHeight * 0.28,
                startX: window.innerWidth * 0.72,
                startY: window.innerHeight * 0.28,
                targetX: window.innerWidth * 0.72,
                targetY: window.innerHeight * 0.28,
                progress: 1,
                duration: 22000,
                depth: 0.92,
                startDepth: 0.92,
                depthTarget: 1,
                wobbleSeed: Math.random() * Math.PI * 2,
                previousX: window.innerWidth * 0.72,
                previousY: window.innerHeight * 0.28,
                tilt: 0,
                facing: 1,
                speed: 0,
                renderX: window.innerWidth * 0.72,
                renderY: window.innerHeight * 0.28
            };

            let beeReady = false;
            let lastTimestamp = 0;
            let loadedBeeImages = 0;

            const resizePollinatorCanvas = () => {
                const dpr = Math.min(window.devicePixelRatio || 1, 1.75);
                pollinatorCanvas.width = Math.round(window.innerWidth * dpr);
                pollinatorCanvas.height = Math.round(window.innerHeight * dpr);
                pollinatorCanvas.style.width = `${window.innerWidth}px`;
                pollinatorCanvas.style.height = `${window.innerHeight}px`;
                pollinatorCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
            };

            const randomBetween = (min, max) => min + Math.random() * (max - min);

            const prepareBeeSprite = (image, cleanBackground = false) => {
                const spriteCanvas = document.createElement('canvas');
                spriteCanvas.width = image.naturalWidth;
                spriteCanvas.height = image.naturalHeight;
                const spriteCtx = spriteCanvas.getContext('2d', { willReadFrequently: cleanBackground });
                spriteCtx.drawImage(image, 0, 0);

                if (!cleanBackground) {
                    return spriteCanvas;
                }

                const imageData = spriteCtx.getImageData(0, 0, spriteCanvas.width, spriteCanvas.height);
                const { data, width, height } = imageData;
                const visited = new Uint8Array(width * height);
                const stack = [];

                const isBackgroundPixel = (x, y) => {
                    const pixelIndex = (y * width + x) * 4;
                    const alpha = data[pixelIndex + 3];
                    if (alpha < 10) return false;

                    const r = data[pixelIndex];
                    const g = data[pixelIndex + 1];
                    const b = data[pixelIndex + 2];
                    const max = Math.max(r, g, b);
                    const min = Math.min(r, g, b);

                    return max > 170 && min > 145 && max - min < 26;
                };

                const pushPixel = (x, y) => {
                    if (x < 0 || y < 0 || x >= width || y >= height) return;
                    const flatIndex = y * width + x;
                    if (visited[flatIndex]) return;
                    if (!isBackgroundPixel(x, y)) return;
                    visited[flatIndex] = 1;
                    stack.push([x, y]);
                };

                for (let x = 0; x < width; x += 1) {
                    pushPixel(x, 0);
                    pushPixel(x, height - 1);
                }

                for (let y = 0; y < height; y += 1) {
                    pushPixel(0, y);
                    pushPixel(width - 1, y);
                }

                while (stack.length) {
                    const [x, y] = stack.pop();
                    const pixelIndex = (y * width + x) * 4;
                    data[pixelIndex + 3] = 0;

                    pushPixel(x + 1, y);
                    pushPixel(x - 1, y);
                    pushPixel(x, y + 1);
                    pushPixel(x, y - 1);
                }

                spriteCtx.putImageData(imageData, 0, 0);
                return spriteCanvas;
            };

            const pickNextTarget = () => {
                const marginX = Math.min(220, window.innerWidth * 0.16);
                const marginY = Math.min(180, window.innerHeight * 0.18);
                beeState.startX = beeState.x;
                beeState.startY = beeState.y;
                beeState.startDepth = beeState.depth;
                beeState.targetX = randomBetween(marginX, Math.max(marginX + 1, window.innerWidth - marginX));
                beeState.targetY = randomBetween(marginY, Math.max(marginY + 1, window.innerHeight - marginY));
                beeState.progress = 0;
                beeState.duration = randomBetween(17000, 29000);
                beeState.depthTarget = randomBetween(0.28, 1.52);
            };

            const drawBee = (time) => {
                const drawX = beeState.renderX;
                const drawY = beeState.renderY;
                const baseBeeSize = Math.min(window.innerWidth * 0.11, 86);
                const perspectiveScale = beeState.depth < 1
                    ? Math.pow(beeState.depth, 1.82)
                    : 1 + Math.pow(beeState.depth - 1, 1.1) * 0.9;
                const size = baseBeeSize * perspectiveScale;
                const depthMix = Math.max(0, Math.min(1, (beeState.depth - 0.28) / 1.24));
                const bodyBlurPx = Math.min(1.85, beeState.speed * 0.5 + (1 - depthMix) * 1.1);
                const smearOffset = Math.min(11, beeState.speed * 3 + (1 - depthMix) * 1.4);
                const wingBeat = Math.sin(time * 0.05);
                const wingPulse = Math.abs(wingBeat);
                const flapCycle = Math.sin(time * (0.018 + beeState.speed * 0.01) + beeState.wobbleSeed * 0.35);
                const currentBeeImage = flapCycle > 0 ? beeSprites[1] : beeSprites[0];
                const wingBlurPx = 4 + wingPulse * 6.5 + beeState.speed * 0.8;
                const wingOpacity = 0.1 + wingPulse * 0.24 + depthMix * 0.05;
                const wingLift = -size * (0.25 + wingPulse * 0.03);
                const wingHeight = size * (0.24 + wingPulse * 0.12);
                const wingWidth = size * (0.11 + wingPulse * 0.05);
                const beeOpacity = 0.36 + depthMix * 0.58;

                pollinatorCtx.save();
                pollinatorCtx.translate(drawX, drawY);
                pollinatorCtx.rotate(beeState.tilt);

                pollinatorCtx.fillStyle = `rgba(67, 108, 73, ${0.06 + depthMix * 0.14})`;
                pollinatorCtx.beginPath();
                pollinatorCtx.ellipse(0, size * 0.34, size * (0.28 + depthMix * 0.08), size * 0.12, 0, 0, Math.PI * 2);
                pollinatorCtx.fill();

                pollinatorCtx.save();
                pollinatorCtx.scale(beeState.facing, 1);
                pollinatorCtx.globalAlpha = wingOpacity;
                pollinatorCtx.filter = `blur(${wingBlurPx}px)`;
                pollinatorCtx.fillStyle = 'rgba(255, 255, 255, 0.95)';

                pollinatorCtx.beginPath();
                pollinatorCtx.ellipse(-size * 0.05, wingLift, wingWidth, wingHeight, -0.95 - wingBeat * 0.16, 0, Math.PI * 2);
                pollinatorCtx.fill();

                pollinatorCtx.beginPath();
                pollinatorCtx.ellipse(size * 0.1, wingLift - size * 0.03, wingWidth * 0.9, wingHeight * 1.08, -0.18 + wingBeat * 0.16, 0, Math.PI * 2);
                pollinatorCtx.fill();
                pollinatorCtx.filter = 'none';
                pollinatorCtx.restore();

                if (smearOffset > 1) {
                    pollinatorCtx.save();
                    pollinatorCtx.translate(-smearOffset, 0);
                    pollinatorCtx.scale(beeState.facing, 1);
                    pollinatorCtx.globalAlpha = 0.1 + depthMix * 0.08;
                    pollinatorCtx.filter = `blur(${bodyBlurPx}px)`;
                    pollinatorCtx.drawImage(currentBeeImage, -size * 0.5, -size * 0.42, size, size);
                    pollinatorCtx.restore();
                }

                pollinatorCtx.scale(beeState.facing, 1);
                pollinatorCtx.globalAlpha = beeOpacity;
                pollinatorCtx.filter = bodyBlurPx > 0.1 ? `blur(${bodyBlurPx}px)` : 'none';
                pollinatorCtx.drawImage(currentBeeImage, -size * 0.5, -size * 0.42, size, size);
                pollinatorCtx.filter = 'none';
                pollinatorCtx.restore();
            };

            const animatePollinator = (timestamp) => {
                if (!beeReady) {
                    requestAnimationFrame(animatePollinator);
                    return;
                }

                if (!lastTimestamp) lastTimestamp = timestamp;
                const delta = Math.min(timestamp - lastTimestamp, 48);
                lastTimestamp = timestamp;

                pollinatorCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);

                beeState.progress += delta / beeState.duration;
                if (beeState.progress >= 1) {
                    beeState.x = beeState.targetX;
                    beeState.y = beeState.targetY;
                    pickNextTarget();
                }

                const eased = 0.5 - Math.cos(Math.min(1, beeState.progress) * Math.PI) / 2;
                beeState.previousX = beeState.x;
                beeState.previousY = beeState.y;
                beeState.x = beeState.startX + (beeState.targetX - beeState.startX) * eased;
                beeState.y = beeState.startY + (beeState.targetY - beeState.startY) * eased;
                beeState.depth = beeState.startDepth + (beeState.depthTarget - beeState.startDepth) * eased;

                const velocityX = beeState.x - beeState.previousX;
                const velocityY = beeState.y - beeState.previousY;
                const velocityMagnitude = Math.hypot(velocityX, velocityY);
                beeState.speed += (velocityMagnitude - beeState.speed) * 0.12;

                if (velocityX > 0.01) beeState.facing = 1;
                if (velocityX < -0.01) beeState.facing = -1;

                const targetTilt = velocityMagnitude > 0.01
                    ? Math.max(-0.32, Math.min(0.32, Math.atan2(velocityY, Math.abs(velocityX) + 0.001) * 0.75))
                    : beeState.tilt;
                beeState.tilt += (targetTilt - beeState.tilt) * 0.12;

                const bobX = Math.sin(timestamp * 0.00055 + beeState.wobbleSeed) * 10;
                const bobY = Math.cos(timestamp * 0.0008 + beeState.wobbleSeed) * 7;
                beeState.renderX = beeState.x + bobX;
                beeState.renderY = beeState.y + bobY;
                drawBee(timestamp);
                requestAnimationFrame(animatePollinator);
            };

            const handleBeeImageLoad = () => {
                loadedBeeImages += 1;
                if (loadedBeeImages === rawBeeImages.length) {
                    beeSprites[0] = prepareBeeSprite(rawBeeImages[0]);
                    beeSprites[1] = prepareBeeSprite(rawBeeImages[1], true);
                    beeReady = true;
                    pickNextTarget();
                    requestAnimationFrame(animatePollinator);
                }
            };

            rawBeeImages.forEach(image => image.addEventListener('load', handleBeeImageLoad));
            rawBeeImages[0].src = './img/bee.png';
            rawBeeImages[1].src = './img/bee2.png';
            resizePollinatorCanvas();
            window.addEventListener('resize', resizePollinatorCanvas);
        }

    </script>
</body>

</html>
